<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UFC Matchup Predictor — React</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial; max-width:880px; margin:28px auto; color:#0f172a; background:#f7f9fc; }
      .container { background:#fff; border-radius:12px; padding:22px; box-shadow: 0 8px 24px rgba(15,23,42,0.06); border:1px solid rgba(15,23,42,0.04); }
      h1 { margin:0 0 8px 0; font-weight:700; color:#0b1220 }
      .row { display:flex; gap:12px; }
      .col { flex:1 }
      label { display:block; font-size:13px; color:#475569; margin-bottom:6px }
      input[type=text] { width:100%; padding:10px 12px; border:1px solid #e6eef6; border-radius:8px; font-size:14px; background:#fbfdff }
      button { padding:10px 14px; margin-top:6px; background:#0f172a; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700 }
      button.secondary { background:#2563eb }
      button.ghost { background:transparent; color:#0f172a; border:1px solid #e6eef6 }
      button:disabled { opacity:0.6; cursor:default }
      .controls { display:flex; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap }
      .result-card { margin-top:18px; background:#ffffff; border-radius:10px; padding:14px; border:1px solid #eef3fb; display:flex; align-items:center; gap:14px }
      .hero { display:flex; align-items:center; gap:12px; margin-bottom:12px }
      .logo { width:48px; height:48px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; background:#0f172a; color:white; font-weight:800; font-size:18px }
      .tagline { color:#64748b; font-size:13px }
      .muted { color:#64748b; font-size:13px }
      .avatar { width:56px; height:56px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:16px }
      .prob-bar { height:10px; background:#f1f5f9; border-radius:999px; overflow:hidden; width:100% }
      .prob-fill { height:100%; background:linear-gradient(90deg,#2563eb,#06b6d4); border-radius:999px }
      .meta { display:flex; gap:8px; align-items:center }
      .chip { background:#eef2ff; color:#3730a3; padding:6px 8px; border-radius:999px; font-weight:700; font-size:12px }
      .enter { transition:transform .18s ease, opacity .18s ease; }
      .spinner { width:16px;height:16px;border-radius:50%;border:3px solid rgba(255,255,255,0.25);border-top-color:rgba(255,255,255,0.95);animation:spin 1s linear infinite;display:inline-block }
      @keyframes spin { to { transform:rotate(360deg) } }
      pre { background:#fbfdff; padding:10px; border-radius:8px; overflow:auto }
    </style>
    <!-- React + ReactDOM + Babel (development, no build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const {useState, useEffect, useRef} = React;

      function App(){
        const [a, setA] = useState('Tito Ortiz');
        const [b, setB] = useState('Chuck Liddell');
        const [recency, setRecency] = useState(true);
        const [out, setOut] = useState(null);
        const [loading, setLoading] = useState(false);
        const [animate, setAnimate] = useState(false);
        const [showDetails, setShowDetails] = useState(false);
        const rootRef = useRef(null);

        useEffect(()=>{
          function onKey(e){ if(e.key==='Enter'){ predict() } }
          window.addEventListener('keydown', onKey);
          return ()=> window.removeEventListener('keydown', onKey);
        },[a,b,recency]);

        async function predict(){
          setLoading(true); setOut(null);
          try{
            const resp = await fetch('/predict', {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({fighter_a: a, fighter_b: b, recency})
            });
            const j = await resp.json();
              setOut(j);
              // trigger entrance animation
              setAnimate(false);
              setTimeout(()=> setAnimate(true), 40);
              if (j && j.winner) {
                launchConfetti();
              }
          }catch(err){
            setOut({error: ''+err});
          } finally { setLoading(false) }
        }

        function initials(name){
          if(!name) return '';
          return name.split(' ').filter(Boolean).slice(0,2).map(s=>s[0].toUpperCase()).join('');
        }

        function colorFrom(name){
          let h=0; for(const c of name){ h = (h*31 + c.charCodeAt(0)) % 360 }
          return `linear-gradient(135deg,hsl(${h} 70% 45%), hsl(${(h+40)%360} 70% 55%))`;
        }

        function copyLink(){
          const url = new URL(window.location.href);
          url.searchParams.set('a', a);
          url.searchParams.set('b', b);
          navigator.clipboard.writeText(url.toString()).then(()=>{
            alert('Copied link to clipboard');
          }).catch(()=>{});
        }

        function launchConfetti(){
          const container = document.getElementById('confetti');
          if (!container) return;
          const colors = ['#ef4444','#f59e0b','#10b981','#3b82f6','#a78bfa'];
          for(let i=0;i<28;i++){
            const el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = (20 + Math.random()*60) + '%';
            el.style.background = colors[Math.floor(Math.random()*colors.length)];
            el.style.top = (10 + Math.random()*20) + 'vh';
            el.style.transform = `translateY(-20vh) rotate(${Math.random()*360}deg)`;
            el.style.animationDelay = (Math.random()*200) + 'ms';
            el.style.width = (6 + Math.random()*10) + 'px';
            el.style.height = (10 + Math.random()*8) + 'px';
            container.appendChild(el);
            setTimeout(()=> el.remove(), 1800);
          }
        }

        return (
          <div className="container">
            <div className="hero">
              <div className="logo">U</div>
              <div>
                <h1>UFC Matchup Predictor</h1>
                <div className="tagline muted">Fast, explainable match predictions with symmetrical training</div>
              </div>
            </div>
            <div className="row">
              <div className="col"><label>Fighter A<input value={a} onChange={e=>setA(e.target.value)} type="text"/></label></div>
              <div className="col"><label>Fighter B<input value={b} onChange={e=>setB(e.target.value)} type="text"/></label></div>
            </div>
                <div className="controls">
                  <label style={{display:'flex',alignItems:'center',gap:8}}><input type="checkbox" checked={recency} onChange={e=>setRecency(e.target.checked)} /> Use recency-weighted aggregates</label>
                  <button onClick={predict} disabled={loading}>{loading? <span style={{display:'inline-flex',alignItems:'center',gap:8}}><span className="spinner"/> Predicting...</span> : 'Predict'}</button>
                  <button className="secondary" onClick={()=>setShowDetails(s=>!s)}>{showDetails? 'Hide':'Details'}</button>
                  <button className="ghost" onClick={copyLink}>Share</button>
                </div>

                {out && <div style={{marginTop:16}}>
                  <h3 style={{margin:'10px 0 6px 0'}}>Result</h3>
                  {out.winner ? (
                    <div className={`result-card ${animate? 'enter':''}`} ref={rootRef}>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                        <div className="avatar" style={{background: colorFrom(a)}}>{initials(a)}</div>
                        <div style={{fontSize:13, color:'#334155', fontWeight:700}}>{a}</div>
                        <div className="muted" style={{marginTop:8}}>
                          {(((out.p_a !== undefined) ? out.p_a : (out.proba !== undefined ? out.proba : 0.5)) * 100).toFixed(1)}%
                        </div>
                      </div>

                      <div style={{flex:1, minWidth:220}}>
                        {(() => {
                          const pA = out.p_a !== undefined ? out.p_a : (out.proba !== undefined ? out.proba : 0.5);
                          const pB = out.p_b !== undefined ? out.p_b : (out.p_a !== undefined ? (1 - out.p_a) : (out.proba !== undefined ? (1 - out.proba) : 0.5));
                          return (
                            <div>
                              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <div style={{fontWeight:700}}>{out.winner}</div>
                                <div className="meta">
                                  <div className="chip">Confidence</div>
                                  <div className="muted">{Math.max(0, Math.min(100, Math.abs(pA - pB) * 100)).toFixed(1)}%</div>
                                </div>
                              </div>

                              <div style={{display:'flex',alignItems:'center',gap:12,marginTop:10}}>
                                <div className="prob-bar" aria-hidden>
                                  <div className="prob-fill" style={{width: `${(pA*100).toFixed(1)}%`}}></div>
                                </div>
                                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end'}}>
                                  <div style={{fontWeight:700}}>{(pA*100).toFixed(1)}%</div>
                                  <div className="muted">{(pB*100).toFixed(1)}%</div>
                                </div>
                              </div>

                              {showDetails && <div style={{marginTop:10}}><pre>{JSON.stringify(out, null, 2)}</pre></div>}
                            </div>
                          )
                        })()}
                      </div>

                      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                        <div className="avatar" style={{background: colorFrom(b)}}>{initials(b)}</div>
                        <div style={{fontSize:13, color:'#334155', fontWeight:700}}>{b}</div>
                      </div>
                    </div>
                  ) : (
                    <pre>{JSON.stringify(out, null, 2)}</pre>
                  )}
                </div>}
                <div id="confetti" className="confetti-container" aria-hidden="true"></div>
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
