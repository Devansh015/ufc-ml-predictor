<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UFC Matchup Predictor — React</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; max-width:980px; margin:36px auto; color:#111827; background: radial-gradient(1200px 400px at 10% 10%, rgba(59,130,246,0.04), transparent), radial-gradient(800px 300px at 90% 90%, rgba(16,185,129,0.03), transparent), #f5f7fb; }
      .container { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,251,255,0.96)); border-radius:14px; padding:28px; box-shadow: 0 10px 30px rgba(15,23,42,0.07); border:1px solid rgba(15,23,42,0.03); }
      h1 { margin:0 0 18px 0; font-weight:600; color:#0f172a }
      .row { display:flex; gap:12px; }
      .col { flex:1 }
      input[type=text] { width:100%; padding:10px 12px; border:1px solid #e6e9ef; border-radius:8px; font-size:14px }
      button { padding:10px 16px; margin-top:12px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600 }
      button.secondary { background:#0ea5a4 }
      button.ghost { background:#111827 }
      button:disabled { opacity:0.6; cursor:default }
      .controls { display:flex; align-items:center; gap:12px; margin-top:12px }
      .result-card { margin-top:20px; background: linear-gradient(180deg,#ffffff,#fbfdff); border-radius:12px; padding:18px; border:1px solid #e6eef8; display:flex; align-items:center; gap:16px }
      .hero { display:flex; align-items:center; gap:16px; margin-bottom:12px }
      .logo { width:56px; height:56px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#2563eb,#3b82f6); color:white; font-weight:800; font-size:18px; box-shadow: 0 6px 18px rgba(59,130,246,0.12); }
      .tagline { color:#475569; font-size:14px }
      .muted { color:#6b7280; font-size:13px }
      .fighter { display:flex; align-items:center; gap:12px }
      .avatar { width:64px; height:64px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:18px }
      .prob-bar { height:10px; background:#eef2ff; border-radius:999px; overflow:hidden; width:220px }
      .prob-fill { height:100%; background:linear-gradient(90deg,#6d28d9,#3b82f6); border-radius:999px }
      .meta { display:flex; gap:8px; align-items:center }
      .chip { background:#eef2ff; color:#3730a3; padding:6px 8px; border-radius:999px; font-weight:700; font-size:12px }

      /* Animations */
      @keyframes fadeInUp { from { opacity:0; transform: translateY(10px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }
      @keyframes pulse { 0%{ transform:scale(1) } 50%{ transform:scale(1.06) } 100%{ transform:scale(1) } }
      .enter { animation: fadeInUp 420ms cubic-bezier(.2,.9,.2,1) both; }
      .pulse { animation: pulse 1200ms ease-in-out infinite; }

      /* spinner */
      .spinner { width:18px;height:18px;border-radius:50%;border:3px solid rgba(255,255,255,0.2);border-top-color:rgba(255,255,255,0.9);animation:spin 1s linear infinite;display:inline-block }
      @keyframes spin { to { transform:rotate(360deg) } }

      /* confetti */
      .confetti-container { position:fixed; left:0; top:0; width:100%; height:0; pointer-events:none; z-index:1200 }
      .confetti { position:absolute; width:10px; height:14px; opacity:0.95; border-radius:2px; animation:fall 1200ms linear forwards; }
      @keyframes fall { to { transform: translateY(420px) rotate(540deg); opacity:0 } }
      .winner-badge { background:#111827; color:white; padding:12px 16px; border-radius:8px; font-weight:700; font-size:18px }
      .winner-text { font-size:18px; color:#0b1220 }
      pre { background:#f7f7f7; padding:12px; border-radius:8px }
    </style>
    <!-- React + ReactDOM + Babel (development, no build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const {useState, useEffect, useRef} = React;

      function App(){
        const [a, setA] = useState('Tito Ortiz');
        const [b, setB] = useState('Chuck Liddell');
        const [recency, setRecency] = useState(true);
        const [out, setOut] = useState(null);
        const [loading, setLoading] = useState(false);
        const [animate, setAnimate] = useState(false);
        const [showDetails, setShowDetails] = useState(false);
        const rootRef = useRef(null);

        useEffect(()=>{
          function onKey(e){ if(e.key==='Enter'){ predict() } }
          window.addEventListener('keydown', onKey);
          return ()=> window.removeEventListener('keydown', onKey);
        },[a,b,recency]);

        async function predict(){
          setLoading(true); setOut(null);
          try{
            const resp = await fetch('/predict', {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({fighter_a: a, fighter_b: b, recency})
            });
            const j = await resp.json();
              setOut(j);
              // trigger entrance animation
              setAnimate(false);
              setTimeout(()=> setAnimate(true), 40);
              if (j && j.winner) {
                launchConfetti();
              }
          }catch(err){
            setOut({error: ''+err});
          } finally { setLoading(false) }
        }

        function initials(name){
          if(!name) return '';
          return name.split(' ').filter(Boolean).slice(0,2).map(s=>s[0].toUpperCase()).join('');
        }

        function colorFrom(name){
          let h=0; for(const c of name){ h = (h*31 + c.charCodeAt(0)) % 360 }
          return `linear-gradient(135deg,hsl(${h} 70% 45%), hsl(${(h+40)%360} 70% 55%))`;
        }

        function copyLink(){
          const url = new URL(window.location.href);
          url.searchParams.set('a', a);
          url.searchParams.set('b', b);
          navigator.clipboard.writeText(url.toString()).then(()=>{
            alert('Copied link to clipboard');
          }).catch(()=>{});
        }

        function launchConfetti(){
          const container = document.getElementById('confetti');
          if (!container) return;
          const colors = ['#ef4444','#f59e0b','#10b981','#3b82f6','#a78bfa'];
          for(let i=0;i<28;i++){
            const el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = (20 + Math.random()*60) + '%';
            el.style.background = colors[Math.floor(Math.random()*colors.length)];
            el.style.top = (10 + Math.random()*20) + 'vh';
            el.style.transform = `translateY(-20vh) rotate(${Math.random()*360}deg)`;
            el.style.animationDelay = (Math.random()*200) + 'ms';
            el.style.width = (6 + Math.random()*10) + 'px';
            el.style.height = (10 + Math.random()*8) + 'px';
            container.appendChild(el);
            setTimeout(()=> el.remove(), 1800);
          }
        }

        return (
          <div className="container">
            <div className="hero">
              <div className="logo">U</div>
              <div>
                <h1>UFC Matchup Predictor</h1>
                <div className="tagline muted">Fast, explainable match predictions with symmetrical training</div>
              </div>
            </div>
            <div className="row">
              <div className="col"><label>Fighter A<input value={a} onChange={e=>setA(e.target.value)} type="text"/></label></div>
              <div className="col"><label>Fighter B<input value={b} onChange={e=>setB(e.target.value)} type="text"/></label></div>
            </div>
                <div className="controls">
                  <label style={{display:'flex',alignItems:'center',gap:8}}><input type="checkbox" checked={recency} onChange={e=>setRecency(e.target.checked)} /> Use recency-weighted aggregates</label>
                  <button onClick={predict} disabled={loading}>{loading? <span style={{display:'inline-flex',alignItems:'center',gap:8}}><span className="spinner"/> Predicting...</span> : 'Predict'}</button>
                  <button className="secondary" onClick={()=>setShowDetails(s=>!s)}>{showDetails? 'Hide':'Details'}</button>
                  <button className="ghost" onClick={copyLink}>Share</button>
                </div>

                {out && <div style={{marginTop:16}}>
                  <h3 style={{margin:'10px 0 6px 0'}}>Result</h3>
                  {out.winner ? (
                    <div className={`result-card ${animate? 'enter':''}`} ref={rootRef}>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                        <div className="avatar" style={{background: colorFrom(a)}}>{initials(a)}</div>
                        <div style={{fontSize:12, color:'#334155'}}>{a}</div>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <div style={{fontWeight:700}}>{out.winner}</div>
                          <div className="meta">
                            <div className="chip">Confidence</div>
                            <div className="muted">{Math.round((Math.max(0.01, Math.abs((out.proba||0.5)-0.5))*200))/1}%</div>
                          </div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:12,marginTop:10}}>
                          <div className="prob-bar" aria-hidden>
                            <div className="prob-fill" style={{width: `${((out.p_a||out.proba||0.7)*100).toFixed(1)}%`}}></div>
                          </div>
                          <div className="muted">{((out.p_a||out.proba||0.7)*100).toFixed(1)}%</div>
                        </div>
                        {showDetails && <div style={{marginTop:10}}><pre>{JSON.stringify(out, null, 2)}</pre></div>}
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                        <div className="avatar" style={{background: colorFrom(b)}}>{initials(b)}</div>
                        <div style={{fontSize:12, color:'#334155'}}>{b}</div>
                      </div>
                    </div>
                  ) : (
                    <pre>{JSON.stringify(out, null, 2)}</pre>
                  )}
                </div>}
                <div id="confetti" className="confetti-container" aria-hidden="true"></div>
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
