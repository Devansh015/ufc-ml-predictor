<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UFC Matchup Predictor</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; }
      label { display:block; margin-top:12px }
      input[type=text] { width:100%; padding:8px }
      button { margin-top:12px; padding:10px 14px }
      .result { margin-top:16px; padding:12px; border:1px solid #ddd }
    </style>
  </head>
  <body>
    <h2>UFC Matchup Predictor</h2>
    <label>Fighter A<input id="a" type="text" value="Tito Ortiz" /></label>
    <label>Fighter B<input id="b" type="text" value="Chuck Liddell" /></label>
    <label><input id="recency" type="checkbox" checked /> Use recency-weighted aggregates</label>
    <button id="go">Predict</button>

    <div id="out" class="result"></div>

    <script>
      function makeResultCard(name){
        return `
          <div style="display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#fff,#fbfdff);padding:14px;border-radius:10px;border:1px solid #e6eef8;">
            <div style="background:#111827;color:#fff;padding:10px 14px;border-radius:8px;font-weight:700">Winner</div>
            <div>
              <div style="font-size:18px;color:#0b1220;font-weight:600">${name}</div>
              <div style="color:#6b7280;font-size:13px">Predicted winner from the model</div>
            </div>
          </div>`
      }

      document.getElementById('go').onclick = async function(){
        const a = document.getElementById('a').value;
        const b = document.getElementById('b').value;
        const recency = document.getElementById('recency').checked;
        const resp = await fetch('/predict', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({fighter_a: a, fighter_b: b, recency})
        });
        const j = await resp.json();
        if (j && j.winner) {
          document.getElementById('out').innerHTML = makeResultCard(j.winner);
        } else {
          document.getElementById('out').innerText = JSON.stringify(j, null, 2);
        }
      }
    </script>
  </body>
</html>
